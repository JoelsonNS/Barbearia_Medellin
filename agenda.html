<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Agenda | BarberLink</title>
    <link rel="stylesheet" href="css/agenda.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main class="agenda-page">
      <header class="agenda-header">
        <a
          href="login.html"
          class="back-button"
          aria-label="Voltar para o login"
        >
          <i class="bi bi-arrow-left"></i>
        </a>
      </header>

      <section class="agenda-content">
        <div class="agenda-title-block">
          <h1>Minha Agenda</h1>
          <p>Você tem <span>5 atendimentos</span> para hoje</p>
        </div>

        <section class="days-slider" aria-label="Dias disponíveis">
          <button class="day-card active" type="button">
            <span class="day-name">HOJE</span>
            <span class="day-number">14</span>
          </button>

          <button class="day-card" type="button">
            <span class="day-name">TER</span>
            <span class="day-number">15</span>
          </button>

          <button class="day-card" type="button">
            <span class="day-name">QUA</span>
            <span class="day-number">16</span>
          </button>

          <button class="day-card" type="button">
            <span class="day-name">QUI</span>
            <span class="day-number">17</span>
          </button>

          <button class="day-card" type="button">
            <span class="day-name">SEX</span>
            <span class="day-number">18</span>
          </button>
        </section>

        <section class="appointments-list">
          <article class="appointment-card">
            <div class="client-avatar">
              <img
                src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=300&q=80"
                alt="Ricardo Oliveira"
              />
            </div>

            <div class="appointment-info">
              <h2>Ricardo Oliveira</h2>
              <p class="service">
                <i class="bi bi-scissors"></i>
                Corte Social
              </p>
            </div>

            <div class="appointment-time">
              <strong>09:00</strong>
              <span>14 OUT 2023</span>
            </div>
          </article>

          <article class="appointment-card">
            <div class="client-avatar">
              <img
                src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=300&q=80"
                alt="Marcus Vinícius"
              />
            </div>

            <div class="appointment-info">
              <h2>Marcus Vinícius</h2>
              <p class="service">
                <i class="bi bi-brush"></i>
                Barba Premium
              </p>
            </div>

            <div class="appointment-time">
              <strong>10:30</strong>
              <span>14 OUT 2023</span>
            </div>
          </article>

          <article class="appointment-card">
            <div class="client-avatar placeholder">
              <i class="bi bi-person-fill"></i>
            </div>

            <div class="appointment-info">
              <h2>Fernando Costa</h2>
              <p class="service">
                <i class="bi bi-scissors"></i>
                Corte & Barba
              </p>
            </div>

            <div class="appointment-time">
              <strong>14:00</strong>
              <span>14 OUT 2023</span>
            </div>
          </article>

          <article class="appointment-card">
            <div class="client-avatar">
              <img
                src="https://images.unsplash.com/photo-1504593811423-6dd665756598?auto=format&fit=crop&w=300&q=80"
                alt="André Santos"
              />
            </div>

            <div class="appointment-info">
              <h2>André Santos</h2>
              <p class="service">
                <i class="bi bi-emoji-sunglasses"></i>
                Limpeza de Pele
              </p>
            </div>

            <div class="appointment-time">
              <strong>16:30</strong>
              <span>14 OUT 2023</span>
            </div>
          </article>
        </section>
      </section>
    </main>

    <!-- Script principal da agenda (carregado após o DOM) -->
    <script src="js/agenda.js"></script>
  </body>
</html>
