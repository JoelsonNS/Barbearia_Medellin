<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Agenda | BarberLink</title>
  <link rel="stylesheet" href="../styles/agenda.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="icon" href="/assets/favicon/favicon-32x32.png" type="image/png">
</head>

<body>
  <main class="agenda-page">
    <header class="agenda-header">
      <a href="login.html" class="back-button" aria-label="Voltar para o login">
        <i class="fa-solid fa-arrow-left"></i>
      </a>

      <div class="header-actions">
        <button id="btnNotificacoes" class="notification-button" type="button" aria-label="Abrir notificações"
          aria-expanded="false" aria-controls="painelNotificacoes">
          <i class="fa-solid fa-bell"></i>
          <span id="notificationDot" class="notification-dot hidden" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <section class="agenda-content">
      <div class="agenda-title-block">
        <h1>Minha Agenda</h1>
        <p>Você tem <span>5 atendimentos</span> para hoje</p>
      </div>

      <section class="days-slider" aria-label="Dias disponíveis">
        <button class="day-card active" type="button">
          <span class="day-name">HOJE</span>
          <span class="day-number">14</span>
        </button>

        <button class="day-card" type="button">
          <span class="day-name">TER</span>
          <span class="day-number">15</span>
        </button>

        <button class="day-card" type="button">
          <span class="day-name">QUA</span>
          <span class="day-number">16</span>
        </button>

        <button class="day-card" type="button">
          <span class="day-name">QUI</span>
          <span class="day-number">17</span>
        </button>

        <button class="day-card" type="button">
          <span class="day-name">SEX</span>
          <span class="day-number">18</span>
        </button>
      </section>

      <!-- Os cards são gerados dinamicamente pelo agenda.js -->
      <section class="appointments-list">
        <div class="empty-state" role="status" aria-live="polite">
          <i class="fa-solid fa-hourglass-half"></i>
          <p>Carregando agendamentos…</p>
        </div>
      </section>
    </section>
  </main>

  <aside id="painelNotificacoes" class="notifications-panel hidden" aria-label="Lista de notificações">
    <header class="notifications-header">
      <h2>Notificações</h2>
    </header>
    <div id="notificationsList" class="notifications-list">
      <p class="notifications-empty">Nenhuma notificação ainda.</p>
    </div>
  </aside>

  <!-- Supabase SDK (deve carregar antes dos módulos JS) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- agenda.js: usa o global supabase do CDN acima -->
  <script type="module" src="../scripts/agenda.js"></script>
</body>

</html>
